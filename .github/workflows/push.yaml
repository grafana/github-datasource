name: Plugins - CI
permissions:
  contents: read
  id-token: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: CI
    uses: grafana/plugin-ci-workflows/.github/workflows/ci.yml@ci-cd-workflows/v6.1.1
    with:
      plugin-version-suffix: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
      run-playwright: true
      playwright-docker-compose-file: e2e/docker-compose.replay.yaml
      run-playwright-with-skip-grafana-dev-image: true
